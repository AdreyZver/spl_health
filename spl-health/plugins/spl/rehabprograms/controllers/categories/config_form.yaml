# ===================================
#  Form Behavior Config
# ===================================

# Record name
name: Category

# Model Form Field configuration
form: $/spl/rehabprograms/models/category/fields.yaml

# Model Class name
modelClass: Spl\Rehabprograms\Models\Category

# Default redirect location
defaultRedirect: spl/rehabprograms/categories

# Create page
create:
    title: backend::lang.form.create_title
    redirect: spl/rehabprograms/categories/update/:id
    redirectClose: spl/rehabprograms/categories

# Update page
update:
    title: backend::lang.form.update_title
    redirect: spl/rehabprograms/categories
    redirectClose: spl/rehabprograms/categories

# Preview page
preview:
    title: backend::lang.form.preview_title
